name: CI

# Build + test gate pour toute PR et tout push sur main.
# Tourne sur GitHub-hosted (ubuntu-latest) — indépendant du runner
# self-hosted `claude-agent` qui peut être down.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AgentDashboard.slnx

      - name: Build
        run: dotnet build AgentDashboard.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test AgentDashboard.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore
